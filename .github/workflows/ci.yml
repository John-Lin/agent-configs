name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y stow jq jsonnet

    - name: Run syntax check
      run: make check-syntax

    - name: Run sync smoke tests
      run: make test-sync-smoke

    - name: Run safety regression tests
      run: make test-safety
